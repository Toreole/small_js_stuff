openapi: 3.1.0
info:
  title: MyApi
  description: A small test Api.
  version: 0.1.0
servers:
  - url: 'http://localhost:8080/v1'
paths:
  /random:
    get:
      tags:
        - Random
      description: Gets a random number
      operationId: getRandomNumber
      parameters:
        - in: query
          name: max
          description: maximum value
          schema:
            type: integer
            format: int64
          required: false
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: integer
                format: int64
